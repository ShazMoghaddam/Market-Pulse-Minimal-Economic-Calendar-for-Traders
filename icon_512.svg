<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1F2E"/>
      <stop offset="100%" style="stop-color:#0F1115"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#4A90E2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#4A90E2" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Glow blob behind chart -->
  <ellipse cx="256" cy="270" rx="160" ry="80" fill="#4A90E2" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Pulse / ECG chart line -->
  <polyline
    points="56,290 110,290 140,290 160,220 185,340 210,180 235,320 255,260 275,260 296,290 340,290 370,290"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Dot at peak -->
  <circle cx="210" cy="180" r="10" fill="#FF5C5C" filter="url(#glow)"/>
  <circle cx="210" cy="180" r="18" fill="#FF5C5C" opacity="0.25"/>

  <!-- Small candlestick bars at bottom -->
  <g fill="#4A90E2" opacity="0.7">
    <rect x="110" y="355" width="18" height="40" rx="3"/>
    <rect x="140" y="345" width="18" height="50" rx="3"/>
    <rect x="170" y="360" width="18" height="35" rx="3"/>
    <rect x="200" y="348" width="18" height="47" rx="3"/>
    <rect x="230" y="355" width="18" height="40" rx="3"/>
    <rect x="260" y="340" width="18" height="55" rx="3"/>
    <rect x="290" y="352" width="18" height="43" rx="3"/>
    <rect x="320" y="358" width="18" height="37" rx="3"/>
    <rect x="350" y="344" width="18" height="51" rx="3"/>
  </g>
  <!-- Highlight some bars in red -->
  <rect x="170" y="360" width="18" height="35" rx="3" fill="#FF5C5C" opacity="0.7"/>
  <rect x="290" y="352" width="18" height="43" rx="3" fill="#FF5C5C" opacity="0.6"/>

  <!-- "MP" monogram text -->
  <text x="256" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800"
    text-anchor="middle" fill="#4A90E2" letter-spacing="-2" opacity="0.9">MP</text>

  <!-- Subtle bottom label -->
  <text x="256" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500"
    text-anchor="middle" fill="#4A90E2" opacity="0.45" letter-spacing="4">MARKET PULSE</text>
</svg>
